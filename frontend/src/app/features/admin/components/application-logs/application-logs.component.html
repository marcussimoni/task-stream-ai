<div class="logs-container">
  <header class="logs-header">
    <h1>Application Logs</h1>
  </header>

  <div class="logs-toolbar">
    <div class="toolbar-left">
      <div class="line-selector">
        <label for="lines">Lines:</label>
        <select id="lines" [ngModel]="lines()" (ngModelChange)="onLinesChange($event)" [disabled]="loading()">
          <option *ngFor="let opt of lineOptions" [value]="opt">{{ opt }}</option>
        </select>
      </div>

      <div class="level-filters">
        <button
          *ngFor="let level of logLevels"
          class="level-chip"
          [class.active]="selectedLevels().has(level)"
          [class]="'level-' + level.toLowerCase()"
          (click)="toggleLevel(level)"
          [title]="level"
        >
          {{ level }}
          <span class="count" *ngIf="levelCounts().get(level) as count">({{ count }})</span>
        </button>
      </div>
    </div>

    <button class="download-btn" (click)="downloadLogs()" [disabled]="logs().length === 0 || loading()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Download
    </button>
  </div>

  <div class="search-bar">
    <div class="search-input-wrapper">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        type="text"
        placeholder="Search in logs..."
        [ngModel]="searchTerm()"
        (ngModelChange)="onSearch($event)"
        class="search-input"
      >
      <button
        *ngIf="searchTerm()"
        class="clear-search"
        (click)="clearSearch()"
        title="Clear search"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>

  <div class="logs-viewer">
    <div *ngIf="loading()" class="loading-state">
      <div class="spinner"></div>
      <p>Loading logs...</p>
    </div>

    <div *ngIf="!loading() && logs().length === 0" class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="12" y1="18" x2="12" y2="12"></line>
        <line x1="9" y1="15" x2="15" y2="15"></line>
      </svg>
      <p>No log entries found</p>
    </div>

    <div *ngIf="!loading() && logs().length > 0 && filteredLogs().length === 0" class="no-results">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <p>No logs match your filters</p>
      <button class="reset-filters" (click)="resetFilters()">
        Reset filters
      </button>
    </div>

    <div *ngIf="!loading() && filteredLogs().length > 0" class="log-lines">
      <div
        *ngFor="let line of filteredLogs()"
        class="log-line"
        [class]="getLevelClass(line)"
        [innerHTML]="escapeHtml(line)"
      ></div>
    </div>
  </div>

  <div class="logs-footer">
    <span *ngIf="!loading() && logs().length > 0">
      Showing {{ filteredLogs().length }} of {{ logs().length }} lines
      <span *ngIf="filteredLogs().length !== logs().length" class="filter-info">
        ({{ logs().length - filteredLogs().length }} hidden by filters)
      </span>
    </span>
  </div>
</div>
