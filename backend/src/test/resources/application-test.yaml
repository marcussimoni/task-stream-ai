spring:
  datasource:
    url: jdbc:h2:file:./target/h2-test/trackdailyapp;INIT=CREATE SCHEMA IF NOT EXISTS daily_track\;SET SCHEMA daily_track;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: password
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximumPoolSize: 5
      minimumIdle: 1
      idleTimeout: 30000
      maxLifetime: 1800000
      connectionTimeout: 30000
      pool-name: daily-track-HikariCP
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false
    repair-on-start: true

application:
  start-alarm-scheduler: "0 0 * * * *"
  start-database-backup-scheduler: "0 */1 * * * *"

logging:
  file:
    name: target/logs/task-stream-ai.log